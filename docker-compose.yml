services:
  frontend:
    build: .
    ports:
      - "${PORT:-80}:80"
    depends_on:
      sillytavern:
        condition: service_started
    restart: unless-stopped

  sillytavern:
    image: ghcr.io/sillytavern/sillytavern:latest
    environment:
      - ST_PORT=8000
      - ST_ENABLE_USER_ACCOUNTS=true
    volumes:
      - st-config:/home/node/app/config
      - st-data:/home/node/app/data
    restart: unless-stopped

  seed-owner:
    image: alpine:latest
    # Share ST's network namespace so seed calls localhost — always whitelisted
    network_mode: "service:sillytavern"
    volumes:
      - ./docker/seed-owner.sh:/seed-owner.sh:ro
      - st-config:/config
    environment:
      - OWNER_HANDLE=${OWNER_HANDLE:-}
      - OWNER_PASSWORD=${OWNER_PASSWORD:-}
      - OWNER_NAME=${OWNER_NAME:-}
      - ST_PORT=8000
    entrypoint: ["/bin/sh", "/seed-owner.sh"]
    depends_on:
      sillytavern:
        condition: service_started
    restart: "no"

volumes:
  st-config:
  st-data:
