services:
  frontend:
    # Pre-built by .github/workflows/docker-publish.yml on every push to main.
    # The droplet pulls this image instead of running the 10-minute Vite build
    # on its single vCPU. If you need a local image for dev, uncomment `build: .`
    # below — docker compose will prefer a registry pull unless you run
    # `docker compose build` explicitly.
    image: ghcr.io/sammygallo/sillytavern-mobile:latest
    # build: .
    ports:
      - "${PORT:-80}:80"
    restart: unless-stopped

  sillytavern:
    image: ghcr.io/sammygallo/sillytavern:feat-role-based-permissions
    entrypoint: ["/bin/sh", "/st-init.sh"]
    # Share frontend's network namespace: nginx connects to localhost:8000,
    # so ST always sees 127.0.0.1 — permanently whitelisted, no tricks needed.
    # Docker Compose infers the startup dependency automatically.
    network_mode: "service:frontend"
    environment:
      - ST_PORT=8000
    volumes:
      - ./docker/st-init.sh:/st-init.sh:ro
      - st-config:/home/node/app/config
      - st-data:/home/node/app/data
    restart: unless-stopped

  seed-owner:
    image: alpine:latest
    # frontend's namespace = ST's namespace (ST uses service:frontend)
    network_mode: "service:frontend"
    volumes:
      - ./docker/seed-owner.sh:/seed-owner.sh:ro
      - st-config:/config
    environment:
      - OWNER_HANDLE=${OWNER_HANDLE:-}
      - OWNER_PASSWORD=${OWNER_PASSWORD:-}
      - OWNER_NAME=${OWNER_NAME:-}
      - ST_PORT=8000
    entrypoint: ["/bin/sh", "/seed-owner.sh"]
    depends_on:
      sillytavern:
        condition: service_started
    restart: "no"

volumes:
  st-config:
  st-data:
