server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static frontend — fall back to index.html for SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ST runs in the same network namespace, so proxy to localhost.
    # X-Forwarded-For is pinned to 127.0.0.1 so ST's whitelist check
    # always sees a whitelisted IP regardless of enableForwardedWhitelist.
    # Safe: ST port 8000 is never exposed externally, so this cannot be spoofed.
    # X-Real-IP carries the actual client IP for application-level use.
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For 127.0.0.1;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / streaming support for message generation
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    location /csrf-token {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For 127.0.0.1;
    }

    location /thumbnail {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For 127.0.0.1;
    }

    location /characters {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For 127.0.0.1;
    }

    # Upstream-compat shim modules — these MUST take precedence over the
    # generic /scripts/ proxy below. They shadow the canonical upstream
    # filenames so ES-module-based extensions can `import { ... } from
    # '../../../extensions.js'` and resolve to the mobile-fork shim instead
    # of dragging in upstream SillyTavern's monolithic frontend.
    # `location =` is an exact-match rule and beats prefix matches.
    location = /scripts/extensions.js {
        try_files $uri =404;
        types { application/javascript js; }
        default_type application/javascript;
    }
    location = /scripts/slash-commands.js {
        try_files $uri =404;
        types { application/javascript js; }
        default_type application/javascript;
    }
    location = /scripts/utils.js {
        try_files $uri =404;
        types { application/javascript js; }
        default_type application/javascript;
    }
    # /script.js (singular) is at the root, not under /scripts/, so it
    # already falls through to static + the SPA fallback. The exact-match
    # rule below disables the SPA fallback so the public/script.js shim is
    # actually served instead of getting rewritten to index.html.
    location = /script.js {
        try_files $uri =404;
        types { application/javascript js; }
        default_type application/javascript;
    }

    # Serves third-party extension scripts loaded by the sandboxed
    # ExtensionFrame iframes. Without this, /scripts/extensions/... falls
    # through to the SPA index.html and the iframe silently gets HTML
    # instead of JavaScript, leaving the extension's UI blank.
    location /scripts/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For 127.0.0.1;
    }

    # Allow uploads up to 20 MB (avatars, sprites, attachments)
    client_max_body_size 20M;

    # Cookies + auth headers can grow past nginx's 8 KB default after a few
    # sessions, producing 400 "Request Header Or Cookie Too Large".
    large_client_header_buffers 8 32k;
    client_header_buffer_size 16k;
}
